services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: first-maven-app
    ports:
      - "9090:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
    restart: unless-stopped
    networks:
      - maven-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  maven-network:
    driver: bridge
