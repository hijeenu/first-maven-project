spring.application.name=first-maven-app
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Application info
app.name=First Maven Application
app.version=1.0.0
app.description=Demo Maven project with Spring Boot and CI/CD
