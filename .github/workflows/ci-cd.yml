name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: first-maven-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Run Unit Tests
      run: mvn test

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/

  build-docker-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/first-maven-app:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKER_USERNAME }}/first-maven-app:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/first-maven-app:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/first-maven-app:buildcache,mode=max

  deploy-to-ec2:
    needs: build-docker-image
    runs-on: ubuntu-latest
    name: Deploy to EC2
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ec2-user/first-maven-app
          docker pull ${{ secrets.DOCKER_USERNAME }}/first-maven-app:${{ env.IMAGE_TAG }}
          docker stop first-maven-app || true
          docker rm first-maven-app || true
          docker run -d \
            --name first-maven-app \
            -p 8080:8080 \
            --restart always \
            -e SPRING_PROFILES_ACTIVE=production \
            ${{ secrets.DOCKER_USERNAME }}/first-maven-app:${{ env.IMAGE_TAG }}
          sleep 10
          if curl -f http://localhost:8080/actuator/health > /dev/null 2>&1; then
            echo "Application deployed successfully"
            exit 0
          else
            echo "Health check failed"
            exit 1
          fi

    - name: Send Slack Notification
      if: always()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "Deployment Status: ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deployment to EC2*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
